animations {
    enabled = true

    # Animation curves
    bezier = specialWorkSwitch, 0, 0, 0, 1
    bezier = emphasizedAccel, 0.03, 0, 0.8, 0.15
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = standard, 0.2, 0, 0, 1
    bezier = popupSmooth, 0.2, 0.05, 0.2, 1

    # Animation configs
    animation = layersIn, 1, 5, popupSmooth, slidefade
    animation = layersOut, 1, 4, popupSmooth, slidefade
    animation = fadeLayers, 1, 5, standard

    animation = windowsIn, 1, 5, emphasizedDecel
    animation = windowsOut, 1, 3, emphasizedAccel
    animation = windowsMove, 1, 5, standard
    animation = workspaces, 1, 5, standard

    animation = specialWorkspace, 1, 4, specialWorkSwitch, slidefadevert 2%

    animation = fade, 1, 6, standard
    animation = fadeDim, 1, 6, standard
    animation = border, 1, 6, standard
}
